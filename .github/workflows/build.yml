name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          docutils \
          gettext \
          libffi-dev \
          libssl-dev \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          lld \
          cmake \
          libtinfo-dev \
          libtinfo6 \
          ncurses-base

    - name: Build APK with Buildozer
      uses: digreatbrian/buildozer-action@v2
      with:
        python-version: "3.10"
        buildozer-cmd: buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ArenMath-APK
        path: bin/*.apk
        retention-days: 30
